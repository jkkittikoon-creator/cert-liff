<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>ตรวจและยืนยันเอกสาร</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Sarabun', -apple-system, 'Segoe UI', sans-serif; margin: 0; color: #222; background: #f7f9fc; }
    .wrap { max-width: 640px; margin: 0 auto; padding: 16px; }
    h2 { font-size: 18px; margin: 8px 0 12px; }
    .msg { padding: 12px; border-radius: 8px; background: #eef3fb; font-size: 14px; margin-bottom: 12px; }
    .msg.err { background: #fdecea; color: #b71c1c; }
    .msg.ok { background: #e8f5e9; color: #1b5e20; }
    .card { background: #fff; border-radius: 10px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 12px; }
    .doc-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
    .doc-item:last-child { border-bottom: none; }
    .doc-item:active { background: #f0f4fa; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
    .b-ai { background: #cce5ff; color: #004085; }
    .b-manual { background: #e2e3e5; color: #383d41; }
    .b-draft { background: #fff3cd; color: #856404; }
    .preview img, .preview embed { width: 100%; max-height: 320px; object-fit: contain; border: 1px solid #ddd; border-radius: 6px; background:#fafafa; }
    .field { margin-bottom: 12px; padding-left: 10px; border-left: 4px solid transparent; }
    .field label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; }
    .field input, .field select { width: 100%; padding: 9px 10px; font-size: 15px; border: 1px solid #ccc; border-radius: 6px; }
    .req { color: #c0392b; }
    .conf-green { border-left-color: #2e7d32; }
    .conf-yellow { border-left-color: #f9a825; }
    .conf-red { border-left-color: #c62828; }
    .conf-gray { border-left-color: #9e9e9e; }
    .note { font-size: 12px; color: #666; margin-top: 3px; }
    .summary { padding: 10px 12px; border-radius: 8px; background: #fff8e1; font-size: 13px; margin-bottom: 12px; }
    .btns { display: flex; gap: 10px; margin-top: 8px; }
    button { flex: 1; padding: 12px; font-size: 15px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
    .b-primary { background: #06c755; color: #fff; }
    .b-second { background: #e9edf3; color: #333; }
    button:disabled { opacity: 0.5; }
    .center { text-align: center; padding: 40px 0; color: #666; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>ตรวจและยืนยันเอกสาร</h2>
    <div id="app"><div class="center">กำลังเชื่อมต่อ LINE...</div></div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    /* ===== ตั้งค่า (แก้ที่นี่ถ้าเปลี่ยน) ===== */
    var LIFF_ID = '2010685002-tqhkzAHP';
    var EXEC_URL = 'https://script.google.com/macros/s/AKfycbwsqvn_Trx3HLllAmNbWqaFiz0CQ73MNnqZQ51ohyQf1O5k7xzEYz2qvlSq1UZX5V3Mxg/exec';
    /* ======================================= */

    var app = document.getElementById('app');
    var FIELDS = ['documentType','academicYear','recipientName','position','activityName',
      'hours','awardResult','competitionLevel','participationRole','issuer','receivedDate','certificateNumber'];
    var REQUIRED = ['documentType','academicYear','recipientName','position','activityName','issuer','receivedDate'];
    var LABELS = {
      documentType:'ประเภทเอกสาร', academicYear:'ปีการศึกษา', recipientName:'ชื่อผู้ได้รับ',
      position:'ตำแหน่ง', activityName:'ชื่อกิจกรรม/หลักสูตร', hours:'จำนวนชั่วโมง',
      awardResult:'ผลรางวัล', competitionLevel:'ระดับการแข่งขัน', participationRole:'บทบาท',
      issuer:'หน่วยงานที่ออก', receivedDate:'วันที่ได้รับ', certificateNumber:'เลขที่เอกสาร'
    };

    function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
    function showErr(m){ app.innerHTML = '<div class="msg err">'+esc(m)+'</div>'; }

    function api(action, payload){
      var body = Object.assign({ action: action, idToken: liff.getIDToken() }, payload||{});
      return fetch(EXEC_URL + '?liff=api', {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(body)
      }).then(function(r){ return r.json(); }).then(function(j){
        if (!j.ok) throw new Error(j.error || 'เกิดข้อผิดพลาด');
        return j.data;
      });
    }

    function getCertParam(){
      var sp = new URLSearchParams(location.search);
      if (sp.get('cert')) return sp.get('cert');
      var st = sp.get('liff.state');
      if (st){ try { var s2 = new URLSearchParams(st.charAt(0)==='?'?st.slice(1):st); if (s2.get('cert')) return s2.get('cert'); } catch(e){} }
      return '';
    }

    /* ---------- confidence UI (ตามข้อ 7.1) ---------- */
    function confClass(ai){
      if(!ai) return '';
      if(ai.source==='USER_ENTERED'||ai.source==='USER_EDITED') return 'conf-gray';
      if(ai.source==='NOT_FOUND'||ai.confidence<0.5) return 'conf-red';
      if(ai.source==='AI_INFERRED'||ai.confidence<0.85) return 'conf-yellow';
      return 'conf-green';
    }
    function confNote(ai){
      if(!ai) return '';
      var pct = Math.round((ai.confidence||0)*100);
      var lbl = { AI_EXTRACTED:'AI อ่านได้ชัด', AI_INFERRED:'AI อนุมาน ควรตรวจ',
        NOT_FOUND:'AI อ่านไม่ได้ ต้องกรอกเอง', USER_EDITED:'แก้ไขเอง', USER_ENTERED:'กรอกเอง' }[ai.source]||ai.source;
      var ev = ai.evidence ? ' — พบ: "'+esc(ai.evidence)+'"' : '';
      return '<div class="note">'+lbl+' ('+pct+'%)'+ev+'</div>';
    }

    /* ---------- หน้ารายการเอกสาร ---------- */
    function renderList(docs){
      if(!docs.length){ app.innerHTML = '<div class="msg">ไม่มีเอกสารที่ต้องตรวจ/ยืนยันในขณะนี้ 🎉<br>ส่งรูปเกียรติบัตรเข้ามาที่แชตได้เลยครับ</div>'; return; }
      var badge = { AI_REVIEW:'<span class="badge b-ai">AI อ่านแล้ว</span>', MANUAL_REVIEW:'<span class="badge b-manual">กรอกเอง</span>',
        DRAFT:'<span class="badge b-draft">ร่าง</span>', FILE_STORED:'<span class="badge b-manual">รอกรอก</span>' };
      var html = '<div class="msg">เลือกเอกสารที่ต้องการตรวจและยืนยัน</div><div class="card">';
      docs.forEach(function(d){
        html += '<div class="doc-item" onclick="openDoc(\''+d.certificateId+'\')">'+
          '<div><div>'+esc(d.recipientName||d.fileName||'เอกสาร')+'</div>'+
          '<div class="note">'+esc(d.documentType||'-')+'</div></div>'+
          (badge[d.status]||'')+'</div>';
      });
      html += '</div>';
      app.innerHTML = html;
    }

    /* ---------- หน้าฟอร์มตรวจ/ยืนยัน ---------- */
    var curCert = null;
    function openDoc(certId){
      app.innerHTML = '<div class="center">กำลังโหลดเอกสาร...</div>';
      api('get', { certificateId: certId }).then(renderForm).catch(function(e){ showErr(e.message); });
    }

    function renderForm(data){
      curCert = data.certificate;
      var c = data.certificate, ai = data.aiResult || {}, dd = data.dropdowns || {};
      var isPdf = c.mimeType === 'application/pdf';
      var prev = isPdf
        ? '<embed src="data:'+c.mimeType+';base64,'+data.previewBase64+'" type="application/pdf" height="320">'
        : '<img src="data:'+c.mimeType+';base64,'+data.previewBase64+'">';

      var red=0, yellow=0, fieldsHtml='';
      FIELDS.forEach(function(name){
        var aiF = ai[name], cls = confClass(aiF);
        if(cls==='conf-red') red++; else if(cls==='conf-yellow') yellow++;
        var val = c[name]==null?'':c[name];
        var req = REQUIRED.indexOf(name)!==-1 ? ' <span class="req">*</span>' : '';
        var input;
        if(name==='documentType'||name==='competitionLevel'){
          var opts = (dd[name]||[]).map(function(v){ return '<option value="'+esc(v)+'"'+(v===val?' selected':'')+'>'+esc(v)+'</option>'; }).join('');
          input = '<select id="f_'+name+'" oninput="edited(\''+name+'\')"><option value="">-- เลือก --</option>'+opts+'</select>';
        } else {
          var type = name==='hours'?'number':(name==='receivedDate'?'date':'text');
          input = '<input type="'+type+'" id="f_'+name+'" value="'+esc(val)+'" oninput="edited(\''+name+'\')">';
        }
        fieldsHtml += '<div class="field '+cls+'" id="ff_'+name+'"><label>'+LABELS[name]+req+'</label>'+input+confNote(aiF)+'</div>';
      });

      var summary = (data.aiResult && Object.keys(data.aiResult).length)
        ? '<div class="summary">แถบสีความมั่นใจ: <b style="color:#c62828">แดง '+red+'</b> (ต้องตรวจ), <b style="color:#f9a825">เหลือง '+yellow+'</b> (ควรตรวจ), เขียว = มั่นใจสูง — กรุณาตรวจก่อนยืนยัน</div>'
        : '';

      app.innerHTML =
        '<div id="formMsg"></div>'+
        '<div class="card preview">'+prev+'</div>'+
        summary+
        '<div class="card">'+fieldsHtml+
        '<div class="btns">'+
        '<button class="b-second" onclick="saveDraft()">บันทึกร่าง</button>'+
        '<button class="b-primary" onclick="confirmSave()">ยืนยันบันทึก</button>'+
        '</div></div>';
    }

    function edited(name){ var el=document.getElementById('ff_'+name); if(el) el.className='field conf-gray'; }

    function collect(){
      var d={}; FIELDS.forEach(function(f){ var el=document.getElementById('f_'+f); if(el) d[f]=el.value; }); return d;
    }
    function setFormMsg(html){ var m=document.getElementById('formMsg'); if(m) m.innerHTML=html; }

    function saveDraft(){
      setFormMsg('<div class="msg">กำลังบันทึกร่าง...</div>');
      api('savedraft', { certificateId: curCert.certificateId, formData: collect() })
        .then(function(){ setFormMsg('<div class="msg ok">บันทึกร่างแล้ว ✅</div>'); })
        .catch(function(e){ setFormMsg('<div class="msg err">'+esc(e.message)+'</div>'); });
    }

    function confirmSave(){
      var d = collect();
      var missing = REQUIRED.filter(function(f){ return !d[f]; }).map(function(f){ return LABELS[f]; });
      if(missing.length){ setFormMsg('<div class="msg err">กรุณากรอกให้ครบ: '+esc(missing.join(', '))+'</div>'); return; }
      setFormMsg('<div class="msg">กำลังยืนยันบันทึก...</div>');
      api('confirm', { certificateId: curCert.certificateId, formData: d })
        .then(function(){
          app.innerHTML = '<div class="msg ok">บันทึกเอกสารสำเร็จแล้ว ✅<br>ระบบส่งการแจ้งเตือนกลับทาง LINE แล้ว</div>'+
            '<div class="btns"><button class="b-primary" onclick="closeOrHome()">เสร็จสิ้น</button></div>';
        })
        .catch(function(e){ setFormMsg('<div class="msg err">'+esc(e.message)+'</div>'); });
    }

    function closeOrHome(){
      if (liff.isInClient()) liff.closeWindow();
      else start();
    }

    /* ---------- เริ่มทำงาน ---------- */
    function start(){
      var cert = getCertParam();
      app.innerHTML = '<div class="center">กำลังโหลด...</div>';
      if(cert){ openDoc(cert); }
      else { api('list').then(renderList).catch(function(e){ showErr(e.message); }); }
    }

    liff.init({ liffId: LIFF_ID })
      .then(function(){
        if(!liff.isLoggedIn()){ liff.login(); return; }
        start();
      })
      .catch(function(err){ showErr('LIFF error: '+(err&&err.message?err.message:err)); });
  </script>
</body>
</html>
