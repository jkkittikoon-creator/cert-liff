    function renderDash(s){
      destroyCharts();
      setPendingBadge(s.pending || 0);
      _dashLatest = s.latest || [];
      var typeKeys = Object.keys(s.byType);
      var yearKeys = Object.keys(s.byYear).sort();
      var hoursYearKeys = Object.keys(s.hoursByYear || {}).sort();

      var tiles = '<div class="stat-grid">'+
        statTile(s.total, 'เอกสารทั้งหมด', '#1a73e8')+
        statTile(s.saved, 'บันทึกแล้ว', '#2e7d32')+
        statTile(s.pending, 'รอตรวจ/แก้ไข', '#f9a825')+
        statTile(s.hours, 'ชั่วโมงอบรมรวม', '#8e24aa')+
        '</div>';

      var typeCard = typeKeys.length ? '<div class="chart-card"><h3>แยกตามประเภทเอกสาร</h3><canvas id="cType"></canvas></div>' : '';
      var yearCard = yearKeys.length ? '<div class="chart-card"><h3>เอกสารแยกตามปีการศึกษา <span class="note">(แตะแท่งเพื่อกรอง)</span></h3><canvas id="cYear"></canvas></div>' : '';
      var hoursCard = hoursYearKeys.length ? '<div class="chart-card"><h3>ชั่วโมงอบรมแยกตามปีการศึกษา</h3><canvas id="cHours"></canvas></div>' : '';

      // ศูนย์รายงานผลงาน (ข้อ 21) — เลือกประเภทรายงาน + ดูรายการที่เคยสร้าง + ลบ ในหน้าเดียว
      var reportCard = '<div class="card"><div style="font-weight:bold;font-size:14px;margin-bottom:6px;">📄 รายงานผลงาน</div>'+
        '<div class="note" style="margin-bottom:8px;">สร้างรายงานราชการ (PDF/Word) เลือกได้ว่าเอาทั้งหมด รายปี ตามประเภท หรือชุดยื่น ว.PA — พร้อมคลังรายงานที่เคยสร้าง</div>'+
        '<button class="b-primary" style="width:100%;" onclick="showReportCenter()">📄 เปิดศูนย์รายงานผลงาน</button></div>';

      // ชิปกรองด่วน (ทั้งหมด / ตามประเภท / ตามปี) — แตะแล้วค้นหาให้ทันที
      _dashChips = [{ q:'', label:'ทั้งหมด' }];
      typeKeys.forEach(function(t){ _dashChips.push({ q:t, label:t }); });
      hoursYearKeys.concat(yearKeys).filter(function(y){ return /^\d{4}$/.test(y); })
        .filter(function(y,i,a){ return a.indexOf(y)===i; }).sort()
        .forEach(function(y){ _dashChips.push({ q:y, label:'ปี '+y }); });
      var chipsHtml = '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">'+
        _dashChips.map(function(c, i){
          return '<button class="b-second" style="flex:none;width:auto;padding:6px 12px;font-size:12px;border-radius:16px;" onclick="dashChip('+i+')">'+esc(c.label)+'</button>';
        }).join('')+'</div>';

      // เอกสารของฉัน: ค้นหา + ชิปกรอง + QR ไฟล์ + Drive + ดาวน์โหลด + ลบ (ครบวงจร)
      var recent = '<div class="card"><div style="font-weight:bold;font-size:14px;margin-bottom:8px;">📂 เอกสารของฉัน</div>'+
        '<div style="display:flex;gap:8px;margin-bottom:10px;">'+
        '<input type="text" id="dq" placeholder="ค้นหา เช่น อบรม canva, ปี 2568..." class="in-txt" style="flex:1;" onkeydown="if(event.key===\'Enter\')dashSearch()">'+
        '<button class="b-primary" style="flex:none;width:auto;padding:9px 16px;font-size:14px;" onclick="dashSearch()">🔍 ค้นหา</button>'+
        '</div>'+
        chipsHtml+
        '<div id="dashDocs">'+dashDocsHtml(s.latest, 'ล่าสุด 5 รายการ — พิมพ์ค้นหาเพื่อดูทั้งหมด')+'</div></div>';

      var closeBtn = '<button class="b-second" style="width:100%;margin-top:6px;" onclick="closeOrHome()">ปิดหน้าต่าง</button>';

      if(!s.total){
        app.innerHTML = tabsBar('dash') + '<div class="msg">ยังไม่มีข้อมูลสำหรับแดชบอร์ดครับ 🐶<br>ส่งรูป/PDF เกียรติบัตรมาที่แชตน้องชาโปรได้เลยน้า</div>' + closeBtn;
        return;
      }

      app.innerHTML = tabsBar('dash') + tiles + typeCard + yearCard + hoursCard + reportCard + recent + closeBtn;

      if(typeof Chart === 'undefined') return; // เผื่อโหลด Chart.js ไม่สำเร็จ (ยังเห็นตัวเลขได้)
      Chart.defaults.font.family = "'Sarabun', sans-serif";
      // โหมดมืด: สีตัวอักษร/เส้นกริดของกราฟตามธีมเครื่อง (ค่า default ของ Chart.js อ่านยากบนพื้นมืด)
      var chartDark = window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches;
      Chart.defaults.color = chartDark ? '#aab3c5' : '#5b6472';
      Chart.defaults.borderColor = chartDark ? '#262f47' : '#e4e8ef';
      if(typeKeys.length){
        _charts.push(new Chart(document.getElementById('cType'), {
          type: 'doughnut',
          data: { labels: typeKeys, datasets: [{ data: typeKeys.map(function(k){return s.byType[k];}), backgroundColor: DASH_COLORS }] },
          options: { responsive:true, plugins:{ legend:{ position:'bottom' } } }
        }));
      }
      if(yearKeys.length){
        _charts.push(new Chart(document.getElementById('cYear'), {
          type: 'bar',
          data: { labels: yearKeys, datasets: [{ label:'จำนวน (ใบ)', data: yearKeys.map(function(k){return s.byYear[k];}), backgroundColor: '#06c755' }] },
          options: {
            responsive:true, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, ticks:{ precision:0 } } },
            // แตะแท่งปี → กรองรายการ "เอกสารของฉัน" ให้เหลือเฉพาะปีนั้น
            onClick: function(evt, els){ if(els && els.length){ dashFilterQuery(yearKeys[els[0].index]); } }
          }
        }));
      }
      if(hoursYearKeys.length){
        _charts.push(new Chart(document.getElementById('cHours'), {
          type: 'bar',
          data: { labels: hoursYearKeys, datasets: [{ label:'ชั่วโมง', data: hoursYearKeys.map(function(k){return s.hoursByYear[k];}), backgroundColor: '#8e24aa' }] },
          options: { responsive:true, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true } } }
        }));
      }
    }

    /* ---------- เอกสารของฉัน (ในแดชบอร์ด): ค้นหา + QR ไฟล์ + ดาวน์โหลด ---------- */
    var _dashLatest = [];   // เก็บรายการล่าสุดไว้ กดล้างคำค้นแล้วกลับมาแสดงได้ทันที
    var _dashChips = [];    // ชิปกรองด่วน (ทั้งหมด/ประเภท/ปี) — แต่ละตัว {q, label}

    var _dashDocs = {};   // เก็บข้อมูลรายเอกสารไว้ใช้ตอนลบ/กู้คืน (วาดแถวเดิมกลับคืนได้)

    // เนื้อในแถวเอกสาร: ชื่อ/ประเภท/สถานะ + ปุ่ม QR/Drive/ดาวน์โหลด (มีไฟล์) หรือ แนบไฟล์ (ไม่มีไฟล์) + ปุ่มลบ (SAVED ทุกใบ)
    function dashDocRowInner(d){
      var btns = '', extra = '', act = '';
      if(d.status==='SAVED'){
        if(d.hasFile){
          act = '<button class="b-second" style="padding:8px 4px;font-size:12px;" onclick="fileQr(\''+d.certificateId+'\')">🔳 QR ไฟล์</button>'+
            '<button class="b-second" style="padding:8px 4px;font-size:12px;color:#188038;" onclick="openDrive(\''+d.certificateId+'\')">📂 เปิด Drive</button>'+
            '<button class="b-second" style="padding:8px 4px;font-size:12px;color:#1a73e8;" onclick="openFile(\''+d.certificateId+'\')">⬇️ ดาวน์โหลด</button>';
        } else {
          extra = '<div class="note" style="margin-top:6px;">ยังไม่มีไฟล์แนบ (นำเข้าย้อนหลัง) — แนบเพิ่มได้</div>';
          act = '<button class="b-second" style="padding:8px 4px;font-size:12px;color:#188038;" onclick="attachFile(\''+d.certificateId+'\')">📎 แนบไฟล์</button>';
        }
        btns = extra + '<div class="dash-btns">'+act+
          '<button class="b-second" style="padding:8px 4px;font-size:12px;color:#d93025;flex:0 0 44px;" onclick="deleteDoc(\''+d.certificateId+'\')" title="ลบไปถังขยะ">🗑️</button></div>';
      }
      return '<div class="dash-name">'+esc(d.name)+'</div>'+
        '<div class="note">'+esc(d.documentType||'-')+' • '+esc(d.statusLabel)+(d.academicYear?' • ปี '+esc(d.academicYear):'')+'</div>'+btns;
    }

    function dashDocsHtml(docs, caption){
      if(!docs.length) return '<div class="note">ไม่พบเอกสารครับ 🐶</div>';
      var h = caption ? '<div class="note" style="margin-bottom:6px;">'+esc(caption)+'</div>' : '';
      docs.forEach(function(d){
        _dashDocs[d.certificateId] = d;
        h += '<div class="doc-item dash-doc" id="dd_'+d.certificateId+'">'+dashDocRowInner(d)+'</div>';
      });
      return h;
    }

    // ลบไปถังขยะ (soft-delete) — ยืนยันก่อน แล้วแถวเปลี่ยนเป็นข้อความ "ลบแล้ว" พร้อมปุ่มกู้คืน (undo ได้ทันที)
    function deleteDoc(certId){
      var d = _dashDocs[certId] || {};
      if(!confirm('ลบ "'+(d.name||'เอกสารนี้')+'" ไปที่ถังขยะ?\n\nกู้คืนได้ทันทีหลังลบ หรือภายหลังจากถังขยะในหน้าเว็บครับ')) return;
      var row = document.getElementById('dd_'+certId);
      if(row) row.innerHTML = '<div class="note">กำลังลบ... 🐾</div>';
      api('delete', { certificateId: certId })
        .then(function(){
          _dashLatest = _dashLatest.filter(function(x){ return x.certificateId!==certId; });
          if(row) row.innerHTML = '<div class="note">🗑️ ลบ "'+esc(d.name||'เอกสาร')+'" ไปที่ถังขยะแล้ว</div>'+
            '<button class="b-second" style="margin-top:6px;padding:6px 12px;font-size:12px;" onclick="restoreDoc(\''+certId+'\')">↩️ กู้คืน</button>';
        })
        .catch(function(e){ if(row) row.innerHTML = dashDocRowInner(d); alert(e.message); });
    }

    // กู้คืนจากถังขยะ — วาดแถวเดิมกลับคืนพร้อมปุ่มครบ
    function restoreDoc(certId){
      var d = _dashDocs[certId] || {};
      var row = document.getElementById('dd_'+certId);
      if(row) row.innerHTML = '<div class="note">กำลังกู้คืน... 🐾</div>';
      api('restore', { certificateId: certId })
        .then(function(){
          _dashLatest.unshift(d);
          if(row) row.innerHTML = dashDocRowInner(d);
        })
        .catch(function(e){
          if(row) row.innerHTML = '<div class="note">🗑️ อยู่ในถังขยะ</div>'+
            '<button class="b-second" style="margin-top:6px;padding:6px 12px;font-size:12px;" onclick="restoreDoc(\''+certId+'\')">↩️ กู้คืน</button>';
          alert(e.message);
        });
    }

    function dashSearch(){
      var q = (document.getElementById('dq').value||'').trim();
      var box = document.getElementById('dashDocs');
      if(!q){ box.innerHTML = dashDocsHtml(_dashLatest, 'ล่าสุด 5 รายการ — พิมพ์ค้นหาเพื่อดูทั้งหมด'); return; }
      box.innerHTML = '<div class="note">กำลังค้นหา...</div>';
      api('search', { query: q })
        .then(function(docs){ box.innerHTML = dashDocsHtml(docs, 'ผลค้นหา "'+q+'" — '+docs.length+' รายการ'+(docs.length>=20?' (แสดงสูงสุด 20)':'')); })
        .catch(function(e){ box.innerHTML = '<div class="msg err">'+esc(e.message)+'</div>'; });
    }

    // ใส่คำค้นลงช่องแล้วค้นหาทันที (ใช้ตอนแตะแท่งกราฟปี) — เลื่อนมาที่รายการให้เห็นผล
    function dashFilterQuery(q){
      var dq = document.getElementById('dq'); if(dq) dq.value = q || '';
      var box = document.getElementById('dashDocs'); if(box) box.scrollIntoView({ behavior:'smooth', block:'center' });
      dashSearch();
    }

    // ชิปกรองด่วน: q ว่าง = แสดงล่าสุด 5, มีค่า = ค้นหา
    function dashChip(i){
      var c = _dashChips[i] || { q:'' };
      dashFilterQuery(c.q);
    }

    /* ---------- ศูนย์รายงานผลงาน (Report Center) ----------
       เลือกประเภทรายงานก่อนสร้าง + คลังรายงานที่เคยสร้าง (ดู/ดาวน์โหลด/ลบ) ในหน้าเดียว
       การเปิดดูใช้ "ลิงก์หน้ารายงาน" โทเคนลับ HMAC เปิดในเบราว์เซอร์ภายนอก (พรีวิว PDF + ปุ่มดาวน์โหลด
       PDF/Word อยู่ในหน้านั้น) — ไม่ใช้ลิงก์ Drive ตรง เพราะกติกา "Drive ห้าม Public" */
    var _reports = [];        // คลังรายงานที่โหลดมาแล้ว (ใช้กรอง/ลบโดยไม่ต้องโหลดใหม่)
    var _rcTimer = null;      // ตัวเดินขั้นตอน progress ระหว่างรอเซิร์ฟเวอร์สร้างรายงาน
    var RC_KINDS = {
      all:     { label: 'ทั้งหมด',   color: '#1a73e8' },
      year:    { label: 'รายปี',     color: '#06c755' },
      doctype: { label: 'ตามประเภท', color: '#8e24aa' },
      pa:      { label: 'ว.PA',      color: '#c62828' }
    };
    var RC_DOCTYPES = ['เกียรติบัตร','วุฒิบัตร','ใบประกาศนียบัตร','อื่นๆ'];

    function showReportCenter(){
      app.innerHTML = '<div class="center">📄 กำลังเปิดศูนย์รายงานผลงาน...</div>';
      api('reportlist')
        .then(function(list){ _reports = list || []; renderReportCenter(); })
        .catch(function(e){ showErr(e, showReportCenter); });
    }

    function rcOptions(arr, ph){
      var h = '<option value="">'+ph+'</option>';
      arr.forEach(function(o){ h += '<option value="'+esc(o)+'">'+esc(o)+'</option>'; });
      return h;
    }

    function renderReportCenter(){
      var yearOpts = rcOptions(OPTIONS.academicYear, '-- เลือกปีการศึกษา --');
      var typeOpts = rcOptions(RC_DOCTYPES, '-- เลือกประเภทเอกสาร --');
      var paOpts = rcOptions(OPTIONS.academicYear, '-- เลือกปีที่ประเมิน --');

      var createCard = '<div class="card">'+
        '<div style="font-weight:bold;font-size:14px;margin-bottom:8px;">✨ สร้างรายงานใหม่</div>'+
        '<div class="field"><label>ประเภทรายงาน</label>'+
        '<select id="rc_kind" onchange="rcKindChange()">'+
        '<option value="all">📚 รวมเกียรติบัตรทั้งหมด</option>'+
        '<option value="year">📅 แยกตามปีการศึกษา</option>'+
        '<option value="doctype">🏷️ แยกตามประเภทเอกสาร</option>'+
        '<option value="pa">🎯 สำหรับยื่น ว.PA (รอบ 1 ต.ค. – 30 ก.ย.)</option>'+
        '</select></div>'+
        '<div class="field" id="rc_year_box" style="display:none;"><label>ปีการศึกษา</label><select id="rc_year">'+yearOpts+'</select></div>'+
        '<div class="field" id="rc_doctype_box" style="display:none;"><label>ประเภทเอกสาร</label><select id="rc_doctype">'+typeOpts+'</select></div>'+
        '<div class="field" id="rc_pa_box" style="display:none;"><label>ปีงบประมาณที่ประเมิน (พ.ศ.)</label><select id="rc_payear" onchange="rcPaNote()">'+paOpts+'</select>'+
        '<div class="note" id="rc_pa_note"></div></div>'+
        '<div id="rc_progress"></div>'+
        '<button class="b-primary" id="rc_go" style="width:100%;" onclick="rcCreate()">🚀 สร้างรายงาน</button></div>';

      var latest = _reports.length ? rcThaiDate(_reports[0].createdAt) : '-';
      var summary = '<div class="msg">📄 <b>ศูนย์รายงานผลงาน</b> — มีรายงานทั้งหมด '+_reports.length+' ฉบับ'+
        (_reports.length ? ' • สร้างล่าสุด '+esc(latest) : '')+'</div>';

      var searchBox = _reports.length > 3
        ? '<input type="text" id="rc_q" placeholder="ค้นหารายงาน เช่น 2568, ว.PA..." '+
          'class="in-txt" style="width:100%;margin-bottom:10px;" oninput="rcFilter()">'
        : '';

      var listCard = '<div class="card"><div style="font-weight:bold;font-size:14px;margin-bottom:8px;">🗂️ รายงานที่เคยสร้าง</div>'+
        searchBox + '<div id="rc_list">'+rcListHtml(_reports)+'</div></div>';

      var backBtn = '<button class="b-second" style="width:100%;margin-top:6px;" onclick="showDash()">📊 ไปหน้าสรุป</button>'+
        '<button class="b-second" style="width:100%;margin-top:6px;" onclick="closeOrHome()">ปิดหน้าต่าง</button>';

      setNav('account');   // ศูนย์รายงานเข้าได้จากเมนู "บัญชี" และหน้าหลัก — ชี้ที่บัญชีให้ผู้ใช้รู้ว่าอยู่ตรงไหน
      app.innerHTML = pageHead('ศูนย์รายงานผลงาน') + summary + createCard + listCard + backBtn;
    }

    function rcKindChange(){
      var k = document.getElementById('rc_kind').value;
      document.getElementById('rc_year_box').style.display = (k==='year') ? '' : 'none';
      document.getElementById('rc_doctype_box').style.display = (k==='doctype') ? '' : 'none';
      document.getElementById('rc_pa_box').style.display = (k==='pa') ? '' : 'none';
      if(k==='pa') rcPaNote();
    }
    // รอบ ว.PA ปี พ.ศ. X = 1 ต.ค. (X-1) ถึง 30 ก.ย. X — แสดงช่วงให้เห็นก่อนสร้าง
    function rcPaRange(beYear){
      var y = Number(beYear) - 543;
      return { from: (y-1)+'-10-01', to: y+'-09-30', label: '1 ต.ค. '+(Number(beYear)-1)+' – 30 ก.ย. '+beYear };
    }
    function rcPaNote(){
      var el = document.getElementById('rc_pa_note'), y = document.getElementById('rc_payear').value;
      if(el) el.textContent = y ? ('ช่วงเอกสารที่จะรวม: '+rcPaRange(y).label) : '';
    }

    // แปลง yyyy-MM-dd → "17 ก.ค. 2569" (พ.ศ.) สำหรับแถวรายการ
    function rcThaiDate(iso){
      var m = /^(\d{4})-(\d{2})-(\d{2})/.exec(String(iso||''));
      if(!m) return String(iso||'-');
      var mo = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
      return Number(m[3])+' '+mo[Number(m[2])-1]+' '+(Number(m[1])+543);
    }

    function rcBadge(kind){
      var k = RC_KINDS[kind] || RC_KINDS.all;
      return '<span class="badge" style="background:'+k.color+'22;color:'+k.color+';">'+k.label+'</span>';
    }

    // วันนี้ (พ.ศ. รูปแบบ yyyy-MM-dd ค.ศ.) สำหรับติด badge "ล่าสุด"
    function rcTodayIso(){
      var d = new Date(), p = function(n){ return (n<10?'0':'')+n; };
      return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());
    }

    function rcRowInner(r){
      var isToday = String(r.createdAt||'').slice(0,10) === rcTodayIso();
      var todayBadge = isToday ? '<span class="badge b-new" style="margin-left:6px;">🆕 ล่าสุด</span>' : '';
      // ขนาดไฟล์ (รายงานเก่าไม่มี = ไม่แสดง)
      var sizes = [];
      if(r.pdfSize) sizes.push('PDF '+r.pdfSize);
      if(r.docxSize) sizes.push('Word '+r.docxSize);
      var sizeText = sizes.length ? ' • '+sizes.join(' · ') : '';
      return '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">'+
        '<div class="dash-name" style="flex:1;">'+esc(r.label)+todayBadge+'</div>'+rcBadge(r.kind)+'</div>'+
        '<div class="note">สร้างเมื่อ '+esc(rcThaiDate(r.createdAt))+(r.total!=='' ? ' • '+esc(r.total)+' รายการ' : '')+sizeText+' • ✅ พร้อมใช้งาน</div>'+
        // แถวปุ่มหลัก 3 ปุ่ม: 🔳 QR (สแกนเปิดรายงานจาก Drive + บันทึกรูปได้) · ⬇️ PDF (แดง) · ⬇️ Word (น้ำเงิน)
        '<div class="dash-btns">'+
        '<button class="b-second" style="padding:8px 4px;font-size:12px;color:#5f6368;" onclick="rcQr(\''+r.reportId+'\')">🔳 QR Code</button>'+
        '<button class="b-second" style="padding:8px 4px;font-size:12px;color:#d93025;font-weight:bold;" onclick="rcPdf(\''+r.reportId+'\')">⬇️ PDF</button>'+
        '<button class="b-second" style="padding:8px 4px;font-size:12px;color:#1a73e8;font-weight:bold;" onclick="rcWord(\''+r.reportId+'\')">⬇️ Word</button>'+
        '</div>'+
        // แถวรอง: 🔗 คัดลอกลิงก์ (แชร์ให้ผู้บริหารดูโดยไม่ต้องโหลด) · 🗑️ ลบ
        '<div class="dash-btns" style="margin-top:6px;">'+
        '<button class="b-second" style="padding:7px 4px;font-size:12px;color:#188038;" onclick="rcCopy(\''+r.reportId+'\')">🔗 คัดลอกลิงก์</button>'+
        '<button class="b-second" style="padding:7px 4px;font-size:12px;color:#d93025;flex:0 0 44px;" onclick="rcDelete(\''+r.reportId+'\')" title="ลบรายงาน">🗑️</button>'+
        '</div>';
    }

    function rcListHtml(list){
      if(!list.length) return '<div class="note">ยังไม่มีรายงานในคลังครับ 🐶 สร้างฉบับแรกได้จากด้านบนเลย</div>';
      var h = '';
      list.forEach(function(r){
        h += '<div class="doc-item dash-doc" id="rc_'+r.reportId+'">'+rcRowInner(r)+'</div>';
      });
      return h;
    }

    function rcFind(id){ for(var i=0;i<_reports.length;i++){ if(_reports[i].reportId===id) return _reports[i]; } return null; }

        return hay.indexOf(q) !== -1;
      });

    // คัดลอกลิงก์เปิดดูรายงาน (ลิงก์ Drive /view ของ PDF — ลิงก์เดียวกับ QR) ไว้แชร์ให้ผู้บริหารเปิดได้โดยไม่ต้องล็อกอิน
    function rcCopy(id){
      var r = rcFind(id); if(!r || !r.viewUrl) return;
      function done(){ alert('คัดลอกลิงก์รายงานแล้วครับ 🔗\nวางส่งให้ผู้บริหารเปิดดูได้เลย (เปิดได้โดยไม่ต้องล็อกอิน)'); }
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(r.viewUrl).then(done).catch(function(){ window.prompt('คัดลอกลิงก์นี้:', r.viewUrl); });
      } else {
        window.prompt('คัดลอกลิงก์นี้:', r.viewUrl);

    function rcDelete(id){

      if(!confirm('ลบรายงาน "'+r.label+'" ออกจากคลัง?\n\nไฟล์จะย้ายไปถังขยะ Google Drive (กู้คืนได้ภายใน 30 วัน) และลิงก์เดิมจะเปิดไม่ได้อีกครับ')) return;

    // สร้างรายงานตามตัวเลือก — แสดง progress เป็นขั้น แล้วเพิ่มเข้าในคลังทันทีเมื่อเสร็จ (ไม่ต้องรีเฟรช)
    function rcCreate(){
      var kind = document.getElementById('rc_kind').value;
      var filters = { reportKind: kind };
      if(kind==='year'){
        var y = document.getElementById('rc_year').value;
        if(!y){ alert('กรุณาเลือกปีการศึกษาก่อนครับ 🐶'); return; }
        filters.academicYear = y;
        filters.reportLabel = 'รายงานปีการศึกษา '+y;
      } else if(kind==='doctype'){
        var t = document.getElementById('rc_doctype').value;
        if(!t){ alert('กรุณาเลือกประเภทเอกสารก่อนครับ 🐶'); return; }
        filters.documentType = t;
        filters.reportLabel = 'รายงาน'+t;
      } else if(kind==='pa'){
        var py = document.getElementById('rc_payear').value;
        if(!py){ alert('กรุณาเลือกปีที่ประเมินก่อนครับ 🐶'); return; }
        var rng = rcPaRange(py);
        filters.dateFrom = rng.from; filters.dateTo = rng.to;
        filters.reportLabel = 'รายงาน ว.PA ปี '+py+' ('+rng.label+')';
      } else {
        filters.reportLabel = 'รายงานรวมเอกสารทั้งหมด';
      }

      var go = document.getElementById('rc_go'), prog = document.getElementById('rc_progress');
      go.disabled = true;
      var steps = ['🔍 กำลังดึงข้อมูลเอกสาร...', '📄 กำลังจัดหน้ารายงานราชการ...', '🖨️ กำลังแปลงเป็น PDF และ Word...'];
      var si = 0;
      function paint(){
        prog.innerHTML = '<div class="msg">'+
          steps.map(function(s,i){
            var mark = i<si ? '✅' : (i===si ? '⏳' : '▫️');
            return '<div class="rc-step'+(i===si?' on':'')+'">'+mark+' '+s+'</div>';
          }).join('')+
          '<div class="note" style="margin-top:6px;">อาจใช้เวลา 1-2 นาที ห้ามปิดหน้านี้นะครับ 🐕</div></div>';
      }
      paint();
      _rcTimer = setInterval(function(){ if(si < steps.length-1){ si++; paint(); } }, 15000);

      api('report', { filters: filters })
        .then(function(d){
          clearInterval(_rcTimer); go.disabled = false;
          prog.innerHTML = '<div class="msg ok">✅ สร้าง "'+esc(filters.reportLabel)+'" สำเร็จ ('+(d.total||0)+' รายการ) — กำลังเปิดพรีวิว...</div>';
          _reports.unshift({
            reportId: d.reportId, label: filters.reportLabel, kind: kind, total: d.total||0,
            status: 'COMPLETED', createdAt: new Date().toISOString().slice(0,10),
            viewUrl: d.viewUrl||'', pdfUrl: d.pdfUrl||'', wordUrl: d.wordUrl||''
          });
          var box = document.getElementById('rc_list');
          if(box) box.innerHTML = rcListHtml(_reports);
          if(d.viewUrl) liffOpen(d.viewUrl);
        })
        .catch(function(e){
          clearInterval(_rcTimer); go.disabled = false;
          prog.innerHTML = '<div class="msg err">'+esc(e.message)+'</div>';
        });
    }

    /* ---------- แนบไฟล์ให้เอกสารที่นำเข้าย้อนหลัง (ยังไม่มีไฟล์) ---------- */
    function attachFile(certId){
      var inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'image/jpeg,image/png,image/webp,application/pdf';
      inp.onchange = function(){ var f = inp.files && inp.files[0]; if(f) doAttach(certId, f); };
      inp.click();
    }
    function doAttach(certId, file){
      var isPdf = file.type === 'application/pdf';
      var maxBytes = isPdf ? 20*1024*1024 : 10*1024*1024;
      if(file.size > maxBytes){ alert('ไฟล์ใหญ่เกินกำหนด (รูปสูงสุด 10MB, PDF สูงสุด 20MB)'); return; }
      var d = _dashDocs[certId] || {};
      var row = document.getElementById('dd_'+certId);
      if(row) row.innerHTML = '<div class="dash-name">'+esc(d.name||'เอกสาร')+'</div><div class="note">กำลังแนบไฟล์... 🐾</div>';
      var reader = new FileReader();
      reader.onload = function(){
        var b64 = String(reader.result||'').split(',')[1] || '';
        api('attach', { certificateId: certId, fileName: file.name, mimeType: file.type, base64: b64 })
          .then(function(){
            d.hasFile = true; d.fileName = file.name; _dashDocs[certId] = d;
            _dashLatest.forEach(function(x){ if(x.certificateId===certId){ x.hasFile = true; x.fileName = file.name; } });
            if(row) row.innerHTML = dashDocRowInner(d);
          })
          .catch(function(e){ if(row) row.innerHTML = dashDocRowInner(d); alert(e.message); });
      };
      reader.onerror = function(){ if(row) row.innerHTML = dashDocRowInner(d); alert('อ่านไฟล์ไม่สำเร็จ'); };
      reader.readAsDataURL(file);
    }

        '<div class="dash-btns"><button class="b-second" style="padding:8px 4px;font-size:12px;color:#188038;" onclick="trashRestore(\''+d.certificateId+'\')">↩️ กู้คืน</button></div>';

    function renderTrash(docs){
      var tabs = tabsBar('trash');

      docs.forEach(function(d){

        .then(function(){ if(row) row.innerHTML = '<div class="note">✅ กู้คืน "'+esc(d.name||'เอกสาร')+'" กลับไปที่ "บันทึกแล้ว" เรียบร้อยแล้ว</div>'; })
        .catch(function(e){ if(row) row.innerHTML = trashRowInner(d); alert(e.message); });

    // QR เปิดดูไฟล์เกียรติบัตรใบนั้น — สแกนแล้วพาไปลิงก์ Google Drive ของไฟล์ใบนั้นโดยตรง

    // บันทึกรูป QR ลงเครื่อง — โหลดรูปจาก QuickChart เป็น blob แล้วสั่งดาวน์โหลด (ถ้าไม่ได้ เปิดรูปในเบราว์เซอร์ภายนอกให้กดบันทึกเอง)
    var _qrUrl = '', _qrName = 'qr.png';
    function saveQrImage(){
      fetch(_qrUrl).then(function(r){ return r.blob(); }).then(function(b){
        var o = URL.createObjectURL(b);
        var a = document.createElement('a');
        a.href = o; a.download = _qrName;
        document.body.appendChild(a); a.click();
        setTimeout(function(){ URL.revokeObjectURL(o); a.remove(); }, 1500);
      }).catch(function(){ liffOpen(_qrUrl); });
    }

    // F1: สร้าง select + "อื่นๆ (พิมพ์เอง)" — ถ้าค่าเดิมไม่อยู่ในลิสต์ เลือก "อื่นๆ" แล้วโชว์ช่องพิมพ์พร้อมค่าเดิม
    function buildSelect(name, options, val){
      var inList = val && options.indexOf(val)!==-1;
      var opts = '<option value="">-- เลือก --</option>';
      options.forEach(function(o){ opts += '<option value="'+esc(o)+'"'+(o===val?' selected':'')+'>'+esc(o)+'</option>'; });
      opts += '<option value="__other__"'+((!inList&&val)?' selected':'')+'>อื่นๆ (พิมพ์เอง)</option>';
      var show = (!inList && val) ? '' : 'display:none;';
      return '<select id="f_'+name+'" onchange="onSel(\''+name+'\')">'+opts+'</select>'+
        '<input type="text" id="fo_'+name+'" class="other-in" style="margin-top:6px;'+show+'" value="'+((!inList&&val)?esc(val):'')+'" '+
        'placeholder="พิมพ์'+esc(LABELS[name])+'..." oninput="edited(\''+name+'\')">';
    }

    function renderField(name, ai, c, dd){
      var aiF = ai[name], cls = confClass(aiF);
      var val = c[name]==null?'':c[name];
      var req = REQUIRED.indexOf(name)!==-1 ? ' <span class="req">*</span>' : '';
      var note = confNote(aiF), input;
      if(PROFILE_FIELDS.indexOf(name)!==-1){
        // F9: ชื่อผู้ได้รับ/ตำแหน่ง มาจากโปรไฟล์ (ไม่มีแถบสี + หมายเหตุที่มา)
        cls = '';
        note = '<div class="note t-info">ℹ️ ดึงจากโปรไฟล์ผู้ใช้งาน — หากไม่ถูกต้องแก้ที่โปรไฟล์</div>';
        input = '<input type="text" id="f_'+name+'" value="'+esc(val)+'" oninput="edited(\''+name+'\')">';
      } else if(SELECT_FIELDS.indexOf(name)!==-1){
        var options = (name==='documentType'||name==='competitionLevel') ? (dd[name]||[]) : (OPTIONS[name]||[]);
        input = buildSelect(name, options, val);
      } else if(name==='receivedDate'){
        // F5: วันที่ (เก็บ ค.ศ.) + หมายเหตุแสดง พ.ศ.
        input = '<input type="date" id="f_'+name+'" value="'+esc(val)+'" oninput="onDate()">'+
          '<div class="note t-ok" id="beNote">'+(val?'📅 '+toBE(val)+' (พ.ศ.)':'')+'</div>';
      } else if(name==='hours'){
        // F11: จำนวนชั่วโมงเป็นตัวเลข (ขึ้นแป้นตัวเลขบนมือถือ)
        input = '<input type="number" inputmode="decimal" min="0" step="0.5" id="f_'+name+'" value="'+esc(val)+'" oninput="edited(\''+name+'\')">';
      } else {
        input = '<input type="text" id="f_'+name+'" value="'+esc(val)+'" oninput="edited(\''+name+'\')">';
      }
      return '<div class="field '+cls+'" id="ff_'+name+'"><label>'+LABELS[name]+req+'</label>'+input+note+'</div>';
    }

    function renderForm(data){
      setNav(lastList === 'saved' ? 'saved' : 'pending');   // เมนูล่างชี้กลับรายการที่เข้ามา
      curCert = data.certificate;
      var c = data.certificate, ai = data.aiResult || {}, dd = data.dropdowns || {};
      var isPdf = c.mimeType === 'application/pdf';
      var isImage = !!data.previewBase64 && !isPdf;
      var isSaved = c.status === 'SAVED'; // เอกสารบันทึกยืนยันแล้ว → ใช้โหมด "บันทึกการแก้ไข"
      // F3+F8: เก็บ src รูปไว้ให้ตัวดูซูม + แตะรูปเปิดตัวดูได้
      window.imgSrc = isImage ? ('data:'+c.mimeType+';base64,'+data.previewBase64) : '';
      var prev = isPdf
        ? '<embed src="data:'+c.mimeType+';base64,'+data.previewBase64+'" type="application/pdf" height="320">'
        : (isImage
          ? '<img src="'+window.imgSrc+'" onclick="openViewer()"><div class="cert-hint">🔍 แตะรูปเพื่อขยาย/ซูมดูรายละเอียด</div>'
          : '<div class="note" style="text-align:center;padding:20px;">ไม่มีไฟล์แนบ</div>');

      var fieldsHtml = FIELDS.map(function(name){ return renderField(name, ai, c, dd); }).join('');

      // F7: แถบสรุปสี — คำนวณสด 3 สี (เติมด้วย updateBanner หลัง render)
      var summary = (data.aiResult && Object.keys(data.aiResult).length) ? '<div class="summary" id="banner"></div>' : '';
      var dupHtml = dupBanner(data.duplicateCheck);
      var floatBtn = isImage ? '<button class="cert-float" onclick="openViewer()">🔍 ดูเกียรติบัตร</button>' : '';

      // เอกสาร SAVED: แจ้งเตือน + ปุ่ม "บันทึกการแก้ไข" (สร้างเวอร์ชันใหม่) แทน "บันทึกร่าง/ยืนยันบันทึก"
      var savedNotice = isSaved
        ? '<div class="msg">📌 เอกสารนี้บันทึกยืนยันแล้ว — แก้ไขได้เลย ระบบจะบันทึกเป็นเวอร์ชันใหม่ (เก็บประวัติเดิมไว้)</div>'
        : '';
      var btns = isSaved
        ? '<button class="b-primary" onclick="updateDoc()">บันทึกการแก้ไข</button>'
        : '<button class="b-second" onclick="saveDraft()">บันทึกร่าง</button>' +
          '<button class="b-primary" onclick="confirmSave()">ยืนยันบันทึก</button>';

      var backBtn = '<button class="b-second" style="width:100%;margin-bottom:10px;" onclick="showList(lastList)">← กลับไปหน้ารายการ</button>';
      var qrBtn = isSaved ? '<button class="b-second" style="width:100%;margin-top:8px;" onclick="showQr()">🔳 ดู QR ตรวจสอบเอกสาร</button>' : '';

      app.innerHTML =
        '<div id="formMsg"></div>'+
        backBtn+
        savedNotice+
        '<div class="card preview">'+prev+'</div>'+
        dupHtml+
        summary+
        '<div class="card">'+fieldsHtml+qrBtn+'</div>'+
        // ปุ่มหลักติดล่างจอ: เลื่อนดูฟิลด์ยาว ๆ อยู่ก็ยังกดยืนยันได้ทันที ไม่ต้องเลื่อนกลับลงมาสุด
        '<div class="sticky-act"><div class="btns">'+btns+'</div></div>'+
        floatBtn;
      updateBanner();
    }

    // F7: นับ 3 สีสดจากสถานะฟิลด์จริง
    function updateBanner(){
      var el = document.getElementById('banner'); if(!el) return;
      var g=0,y=0,r=0;
      ['documentType','academicYear','activityName','hours','awardResult','competitionLevel',
        'participationRole','issuer','receivedDate','certificateNumber'].forEach(function(n){
        var ff = document.getElementById('ff_'+n); if(!ff) return;
        if(/conf-green/.test(ff.className)) g++;
        else if(/conf-yellow/.test(ff.className)) y++;
        else if(/conf-red/.test(ff.className)) r++;
      });
      el.innerHTML = 'แถบสีความมั่นใจ (ปรับตามการแก้ไข): <b class="t-ok">เขียว '+g+'</b>, '+
        '<b class="t-warn">เหลือง '+y+'</b>, <b class="t-err">แดง '+r+'</b> — กรุณาตรวจก่อนยืนยัน';
    }

    /* ---------- แถบเตือนเอกสารซ้ำ (ข้อ 13) ---------- */
    function dupBanner(dc){
      if(!dc || !dc.level || dc.level==='NONE') return '';
      var head = dc.level==='PROBABLE' ? '⚠️ อาจซ้ำ: เลขที่เอกสารตรงกับที่เคยเก็บไว้'
        : dc.level==='EXACT' ? '🚫 ซ้ำ: ไฟล์เดียวกับที่เคยเก็บไว้'
        : '⚠️ อาจซ้ำ: กิจกรรม/หน่วยงาน/วันที่ ใกล้เคียงกับที่เคยเก็บไว้';
      var items = (dc.matches||[]).slice(0,3).map(function(m){
        var t = esc(m.activityName || m.documentType || '(ไม่มีชื่อกิจกรรม)');
        if(m.receivedDate) t += ' — ' + esc(m.receivedDate);
        if(m.certificateNumber) t += ' [เลขที่ ' + esc(m.certificateNumber) + ']';
        return '<li>'+t+'</li>';
      }).join('');
      var cls = dc.level==='EXACT' ? ' dup-exact' : '';
      return '<div class="dup-warn'+cls+'"><b>'+head+'</b>'+
        (items ? '<ul>'+items+'</ul>' : '')+
        '<div class="foot">ถ้ากดยืนยันบันทึก ระบบจะจดไว้ว่าเจ้านายตัดสินใจเก็บแม้อาจซ้ำ (ข้อ 13)</div></div>';
    }

    /* ---------- ตัวช่วยฟิลด์ ---------- */
    function onSel(name){
      var s=document.getElementById('f_'+name), o=document.getElementById('fo_'+name);
      if(s&&o){ if(s.value==='__other__'){ o.style.display=''; o.focus(); } else { o.style.display='none'; o.value=''; } }
      edited(name);
    }
    function edited(name){
      var el=document.getElementById('ff_'+name);
      if(el && PROFILE_FIELDS.indexOf(name)===-1) el.className='field conf-gray';
      updateBanner();
    }
    function toBE(iso){
      var m=/^(\d{4})-(\d{2})-(\d{2})/.exec(String(iso||'')); if(!m) return '';
      return Number(m[3])+' '+THMONTHS[Number(m[2])-1]+' '+(Number(m[1])+543);
    }
    function onDate(){
      var el=document.getElementById('f_receivedDate'), n=document.getElementById('beNote');
      if(n) n.innerHTML=(el&&el.value)?'📅 '+toBE(el.value)+' (พ.ศ.)':'';
      edited('receivedDate');
    }
    // ดึงค่าจริง — ถ้า select เลือก "อื่นๆ" ใช้ค่าจากช่องพิมพ์เอง
    function vfval(name){
      var s=document.getElementById('f_'+name);
      if(s && s.tagName==='SELECT'){ if(s.value==='__other__'){ var o=document.getElementById('fo_'+name); return o?o.value.trim():''; } return s.value; }
      return s?s.value:'';
    }
    function collect(){
      var d={}; FIELDS.forEach(function(f){ d[f]=vfval(f); }); return d;
    }
    function setFormMsg(html){ var m=document.getElementById('formMsg'); if(m) m.innerHTML=html; }

    /* ---------- ตัวดูเกียรติบัตร ซูม/แพน (F3+F8) ---------- */
    var zS=1, zTx=0, zTy=0;
    function zApply(){ var im=document.getElementById('cvImg'); if(im) im.style.transform='translate('+zTx+'px,'+zTy+'px) scale('+zS+')'; }
    function zClamp(s){ return Math.max(1, Math.min(5, s)); }
    function zReset(){ zS=1; zTx=0; zTy=0; zApply(); }
    function openViewer(){
      if(!window.imgSrc) return;
      document.getElementById('viewerRoot').innerHTML =
        '<div class="cv-overlay"><div class="cv-stage" id="cvStage"><img class="cv-img" id="cvImg" src="'+window.imgSrc+'" draggable="false"></div>'+
        '<button class="cv-close" onclick="closeViewer()">✕ ปิด</button><button class="cv-reset" onclick="zReset()">⟲ รีเซ็ต</button></div>';
      zBind();
    }
    function closeViewer(){ document.getElementById('viewerRoot').innerHTML=''; }
    function zDist(t){ return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }
    function zDouble(px,py,st){
      if(zS>1){ zReset(); return; }
      var rc=st.getBoundingClientRect(), cx=rc.left+rc.width/2, cy=rc.top+rc.height/2;
      zS=2.5; zTx=(px-cx)*(1-zS); zTy=(py-cy)*(1-zS); zApply();
    }
    function zBind(){
      zReset();
      var st=document.getElementById('cvStage'); if(!st) return;
      var sd=0, ss=1, pan=false, lx=0, ly=0, lt=0;
      st.addEventListener('touchstart', function(e){
        if(e.touches.length===2){ sd=zDist(e.touches); ss=zS; }
        else if(e.touches.length===1){ var n=Date.now();
          if(n-lt<300){ zDouble(e.touches[0].clientX,e.touches[0].clientY,st); lt=0; }
          else { lt=n; pan=zS>1; lx=e.touches[0].clientX; ly=e.touches[0].clientY; } }
      }, {passive:false});
      st.addEventListener('touchmove', function(e){
        if(e.touches.length===2){ e.preventDefault(); zS=zClamp(ss*(zDist(e.touches)/(sd||1))); zApply(); }
        else if(e.touches.length===1 && pan){ e.preventDefault(); var t=e.touches[0]; zTx+=t.clientX-lx; zTy+=t.clientY-ly; lx=t.clientX; ly=t.clientY; zApply(); }
      }, {passive:false});
      st.addEventListener('touchend', function(){ pan=zS>1; });
      st.addEventListener('wheel', function(e){ e.preventDefault(); zS=zClamp(zS*(e.deltaY<0?1.15:0.87)); zApply(); }, {passive:false});
      st.addEventListener('dblclick', function(e){ zDouble(e.clientX,e.clientY,st); });
    }

    /* ---------- โอเวอร์เลย์ "กำลังบันทึก" ---------- */
    function showSaveOverlay(text, sub){
      var el = document.getElementById('saveOverlay');
      if(!el){ el = document.createElement('div'); el.id = 'saveOverlay'; document.body.appendChild(el); }
      el.className = 'save-overlay show';
      el.innerHTML = '<div class="save-card"><div class="save-spinner"></div>' +
        '<div class="save-text">'+esc(text)+'</div>' +
        (sub ? '<div class="save-sub">'+esc(sub)+'</div>' : '') + '</div>';
    }
    function setSaveOverlaySuccess(text, sub){
      var el = document.getElementById('saveOverlay');
      if(!el) return;
      el.innerHTML = '<div class="save-card"><div class="save-check">✅</div>' +
        '<div class="save-text">'+esc(text)+'</div>' +
        (sub ? '<div class="save-sub">'+esc(sub)+'</div>' : '') + '</div>';
    }
    function hideSaveOverlay(){
      var el = document.getElementById('saveOverlay');
      if(el) el.className = 'save-overlay';
    }

    function saveDraft(){
      setFormMsg('<div class="msg">กำลังบันทึกร่าง...</div>');
      api('savedraft', { certificateId: curCert.certificateId, formData: collect() })
        .then(function(){ setFormMsg('<div class="msg ok">บันทึกร่างแล้ว ✅</div>'); })
        .catch(function(e){ setFormMsg('<div class="msg err">'+esc(e.message)+'</div>'); });
    }

    // F10 + F11: validation summary + เลื่อนไปหาฟิลด์ที่ขาด + confirm dialog ก่อนบันทึกจริง
    function confirmSave(){
      var missing = REQUIRED.filter(function(f){ return !String(vfval(f)||'').trim(); });
      if(missing.length){
        setFormMsg('<div class="msg err"><b>กรุณากรอกข้อมูลที่จำเป็นให้ครบก่อนบันทึก:</b> '+
          esc(missing.map(function(f){ return LABELS[f]; }).join(', '))+'</div>');
        var ff = document.getElementById('ff_'+missing[0]);
        if(ff) ff.scrollIntoView({ behavior:'smooth', block:'center' });
        return;
      }
      if(!window.confirm('ยืนยันการบันทึกข้อมูลนี้ใช่หรือไม่?\n\nเมื่อบันทึกแล้วข้อมูลจะถูกนำไปใช้ในระบบจัดเก็บเอกสาร/ว.PA')) return;

      var d = collect();
      showSaveOverlay('กำลังบันทึกข้อมูล...', 'กรุณารอสักครู่นะครับ 🐾');
      api('confirm', { certificateId: curCert.certificateId, formData: d })
        .then(function(){
          setSaveOverlaySuccess('บันทึกสำเร็จแล้วครับเจ้านาย! ✅', 'น้องชาโปรส่งสรุปกลับไปในแชต LINE ให้แล้วน้า');
          setTimeout(function(){
            hideSaveOverlay();
            app.innerHTML = '<div class="msg ok">บันทึกสำเร็จแล้วครับเจ้านาย! ✅🐾<br>น้องชาโปรส่งสรุปกลับไปในแชต LINE ให้แล้วน้า</div>'+
              '<div class="btns"><button class="b-second" onclick="showList(\'pending\')">ตรวจเอกสารถัดไป</button><button class="b-primary" onclick="closeOrHome()">เสร็จสิ้น</button></div>';
          }, 1300);
        })
        .catch(function(e){ hideSaveOverlay(); setFormMsg('<div class="msg err">'+esc(e.message)+'</div>'); });
    }

    // ดู QR ตรวจสอบเอกสาร (เฉพาะ SAVED) — เรนเดอร์ภาพ QR จาก verifyUrl (ลิงก์ตรวจสอบสาธารณะ ไม่มีข้อมูลส่วนตัว)
    function showQr(){
      api('qr', { certificateId: curCert.certificateId }).then(function(d){
        var url = 'https://quickchart.io/qr?size=260&margin=2&text='+encodeURIComponent(d.verifyUrl);
        document.getElementById('viewerRoot').innerHTML =
          '<div class="cv-overlay" style="flex-direction:column;background:rgba(0,0,0,0.85);">'+
          '<div style="background:#fff;padding:20px;border-radius:12px;text-align:center;max-width:300px;">'+
          '<div style="font-weight:bold;margin-bottom:10px;">🔳 QR ตรวจสอบเอกสาร</div>'+
          '<img src="'+url+'" style="width:240px;height:240px;" alt="QR">'+
          '<div class="note" style="word-break:break-all;margin-top:8px;">'+esc(d.verifyUrl)+'</div></div>'+
          '<button class="cv-close" onclick="closeViewer()">✕ ปิด</button></div>';
      }).catch(function(e){ setFormMsg('<div class="msg err">'+esc(e.message)+'</div>'); });
    }

    // แก้ไขเอกสารที่บันทึกยืนยันแล้ว (SAVED) → สร้างเวอร์ชันใหม่
    function updateDoc(){
      var missing = REQUIRED.filter(function(f){ return !String(vfval(f)||'').trim(); });
      if(missing.length){
        setFormMsg('<div class="msg err"><b>กรุณากรอกข้อมูลที่จำเป็นให้ครบ:</b> '+
          esc(missing.map(function(f){ return LABELS[f]; }).join(', '))+'</div>');
        var ff = document.getElementById('ff_'+missing[0]);
        if(ff) ff.scrollIntoView({ behavior:'smooth', block:'center' });
        return;
      }
      if(!window.confirm('ยืนยันการบันทึกการแก้ไขใช่หรือไม่?\n\nระบบจะบันทึกเป็นเวอร์ชันใหม่ (เก็บประวัติเดิมไว้)')) return;
      showSaveOverlay('กำลังบันทึกการแก้ไข...', 'กรุณารอสักครู่นะครับ 🐾');
      api('update', { certificateId: curCert.certificateId, formData: collect() })
        .then(function(r){
          hideSaveOverlay();
          if(r && r.changed===false){ setFormMsg('<div class="msg ok">ไม่มีข้อมูลที่เปลี่ยนแปลง</div>'); return; }
          setSaveOverlaySuccess('บันทึกการแก้ไขแล้ว ✅');
          setTimeout(function(){
            hideSaveOverlay();
            app.innerHTML = '<div class="msg ok">บันทึกการแก้ไขเรียบร้อยแล้วครับเจ้านาย! ✅🐾</div>'+
              '<div class="btns"><button class="b-second" onclick="showList(\'saved\')">กลับหน้ารายการ</button><button class="b-primary" onclick="closeOrHome()">เสร็จสิ้น</button></div>';
          }, 1000);
        })
        .catch(function(e){ hideSaveOverlay(); setFormMsg('<div class="msg err">'+esc(e.message)+'</div>'); });
    }

    function closeOrHome(){
      if (liff.isInClient()) liff.closeWindow();
      else start();
    }

    /* ---------- เปิดจาก Rich Menu ปุ่ม "รายงานผลงาน" (?tab=report): เข้าศูนย์รายงานผลงาน ---------- */
    function autoReport(){ showReportCenter(); }

    /* ---------- เริ่มทำงาน ---------- */
    function start(){
      var cert = getCertParam(), tab = getTabParam();
      app.innerHTML = homeSkeleton();
      if(cert){ openDoc(cert); }                        // เปิดจากลิงก์เอกสารใบใดใบหนึ่ง
      else if(tab==='report'){ showReportCenter(); }    // Rich Menu ปุ่ม "รายงานผลงาน"
      else if(tab==='dash'){ showDash(); }              // Rich Menu ปุ่ม "สรุป"
      else if(tab==='pending'){ showList('pending'); }
      else if(tab==='calendar'){ showCalendar(); }      // ลิงก์/Rich Menu ปุ่ม "ปฏิทินอบรม"
      else { showHome(); }
    }

    // อ่านธีมที่ผู้ใช้เคยเลือกก่อนวาดหน้าแรก จะได้ไม่เห็นจอกะพริบจากสว่างไปมืด
    (function(){
      try {
        var t = localStorage.getItem(THEME_KEY);
        if (t === 'dark' || t === 'light') applyTheme(t);
      } catch(e) { /* โหมดส่วนตัวอ่านไม่ได้ — ใช้ธีมตามเครื่อง */ }
    })();

    liff.init({ liffId: LIFF_ID })
      .then(function(){
        if(!liff.isLoggedIn()){ liff.login(); return; }
        // ดึงโปรไฟล์ไว้ "แสดงผล" อย่างเดียว — สิทธิ์เข้าถึงข้อมูลยังตัดสินจาก idToken ฝั่งเซิร์ฟเวอร์เสมอ
        // ถ้าดึงไม่ได้ก็ยังใช้งานต่อได้ แค่ไม่มีชื่อ/รูป จึงไม่ปล่อยให้ error หยุดการทำงาน
        return liff.getProfile()
          .then(function(p){ LIFF_PROFILE = p; })
          .catch(function(){ LIFF_PROFILE = null; })
          .then(start);
      })
      .catch(function(err){
        showErr('เปิดระบบไม่สำเร็จ: ' + ((err && err.message) ? err.message : err), function(){ location.reload(); });
      });
  </script>
